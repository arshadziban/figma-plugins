<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Size Reducer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #16161f;
      --surface:      #1f1f2e;
      --surface2:     #282838;
      --surface3:     #2f2f42;
      --border:       #35354a;
      --border-light: #42425a;
      --accent:       #7b68ee;
      --accent2:      #a78bfa;
      --accent-hover: #8f7cf5;
      --accent-glow:  rgba(123,104,238,0.18);
      --accent-light: rgba(123,104,238,0.1);
      --text:         #e2e2f0;
      --text-sub:     #a0a0bc;
      --text-muted:   #666680;
      --success:      #34d399;
      --success-bg:   rgba(52,211,153,0.1);
      --error:        #f87171;
      --error-bg:     rgba(248,113,113,0.1);
      --warning:      #fbbf24;
      --warning-bg:   rgba(251,191,36,0.1);
      --radius:       10px;
      --radius-sm:    6px;
      --radius-xs:    4px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
      padding: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 13px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #7b68ee 0%, #a78bfa 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(123,104,238,0.35);
    }
    .logo svg { width: 16px; height: 16px; }
    .header-text { flex: 1; }
    .header-title {
      font-size: 13px; font-weight: 700;
      color: var(--text); letter-spacing: -0.01em;
    }
    .header-sub {
      font-size: 10px; color: var(--text-muted); margin-top: 1px;
    }

    /* ── Section label ──────────────────────────────────────── */
    .section-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 8px;
    }

    /* ── Cards ──────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
    }
    .divider { height: 1px; background: var(--border); margin: 11px 0; }

    /* ── Empty state ────────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 18px 10px; color: var(--text-muted);
    }
    .empty-icon {
      width: 38px; height: 38px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;
    }
    .empty-icon svg { width: 18px; height: 18px; opacity: 0.5; }
    .empty-state p { font-size: 11px; line-height: 1.6; }
    .empty-state strong { color: var(--text-sub); font-weight: 500; }

    /* ── Node list ──────────────────────────────────────────── */
    .node-list { display: flex; flex-direction: column; gap: 5px; }
    .node-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      background: var(--surface2);
    }
    .node-item:hover { border-color: var(--border-light); background: var(--surface3); }
    .node-item.selected {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .node-icon {
      width: 26px; height: 26px; flex-shrink: 0;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      display: flex; align-items: center; justify-content: center;
    }
    .node-item.selected .node-icon {
      background: var(--accent-glow);
      border-color: var(--accent);
    }
    .node-icon svg { width: 12px; height: 12px; color: var(--text-muted); }
    .node-item.selected .node-icon svg { color: var(--accent2); }
    .node-info { flex: 1; min-width: 0; }
    .node-name {
      font-weight: 600; font-size: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }
    .node-dims { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
    .node-type-tag {
      font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
      padding: 2px 5px; border-radius: 3px;
      background: var(--accent-light); color: var(--accent2);
      flex-shrink: 0; text-transform: uppercase;
    }
    .check-ring {
      width: 15px; height: 15px; flex-shrink: 0;
      border-radius: 50%; border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.12s;
    }
    .check-ring svg { width: 8px; height: 8px; display: none; }
    .node-item.selected .check-ring {
      background: var(--accent); border-color: var(--accent);
    }
    .node-item.selected .check-ring svg { display: block; }

    /* ── Format toggle ──────────────────────────────────────── */
    .format-toggle {
      display: flex; background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 3px; gap: 3px;
    }
    .format-btn {
      flex: 1; padding: 6px 8px; border: none; border-radius: 4px;
      background: transparent; color: var(--text-muted);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.12s; letter-spacing: 0.01em;
    }
    .format-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 1px 4px rgba(123,104,238,0.4);
    }
    .format-hint {
      font-size: 10px; color: var(--text-muted);
      margin-top: 6px; line-height: 1.5;
    }

    /* ── Target size ────────────────────────────────────────── */
    .size-row { display: flex; gap: 7px; align-items: stretch; }
    .size-input-wrap { flex: 1; position: relative; }
    .size-input {
      width: 100%; padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 20px; font-weight: 700; outline: none;
      text-align: center;
      transition: border-color 0.12s, box-shadow 0.12s;
      appearance: none; -moz-appearance: textfield;
      letter-spacing: -0.02em;
    }
    .size-input::-webkit-inner-spin-button,
    .size-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .size-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .size-input::placeholder { color: var(--text-muted); font-size: 16px; font-weight: 400; }

    .unit-toggle { display: flex; flex-direction: column; gap: 4px; }
    .unit-btn {
      flex: 1; padding: 0 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2); color: var(--text-muted);
      font-size: 11px; font-weight: 700; cursor: pointer;
      transition: all 0.12s; letter-spacing: 0.04em;
    }
    .unit-btn:hover { border-color: var(--border-light); color: var(--text-sub); }
    .unit-btn.active {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent2);
    }

    .presets { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
    .preset-lbl {
      font-size: 10px; color: var(--text-muted);
      align-self: center; margin-right: 1px;
    }
    .preset-btn {
      padding: 3px 9px;
      border: 1px solid var(--border); border-radius: 20px;
      background: transparent; color: var(--text-muted);
      font-size: 10px; font-weight: 600; cursor: pointer;
      transition: all 0.12s;
    }
    .preset-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Status ─────────────────────────────────────────────── */
    .status {
      display: none; padding: 8px 11px;
      border-radius: var(--radius-sm);
      font-size: 11px; font-weight: 500;
      margin-bottom: 8px;
      align-items: center; gap: 8px;
    }
    .status.visible { display: flex; }
    .status.loading { background: var(--accent-light); color: var(--accent2); border: 1px solid rgba(123,104,238,0.2); }
    .status.error   { background: var(--error-bg);   color: var(--error);   border: 1px solid rgba(248,113,113,0.2); }
    .status.success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(52,211,153,0.2); }
    .status.warning { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(251,191,36,0.2); }

    .spinner {
      width: 13px; height: 13px; flex-shrink: 0;
      border: 2px solid rgba(167,139,250,0.25);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Primary button ─────────────────────────────────────── */
    .btn-primary {
      width: 100%; padding: 11px;
      border: none; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      font-size: 12px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: opacity 0.12s, box-shadow 0.12s;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 10px rgba(123,104,238,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      opacity: 0.92;
      box-shadow: 0 4px 16px rgba(123,104,238,0.4);
    }
    .btn-primary:disabled {
      opacity: 0.35; cursor: not-allowed;
      box-shadow: none;
    }
    .btn-primary svg { width: 14px; height: 14px; }

    /* ── Output ─────────────────────────────────────────────── */
    .output-section { display: none; }
    .output-section.visible { display: block; }

    .preview-wrap {
      background:
        repeating-conic-gradient(#252535 0% 25%, #1f1f2e 0% 50%)
        0 0 / 12px 12px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 10px;
      min-height: 64px; max-height: 160px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
    }
    .preview-wrap img {
      max-width: 100%; max-height: 160px;
      object-fit: contain; display: block;
    }

    /* ── Size comparison ────────────────────────────────────── */
    .compare-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 12px;
      margin-bottom: 10px;
    }
    .compare-row {
      display: grid; grid-template-columns: 72px 1fr 58px;
      align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .compare-row:last-of-type { margin-bottom: 0; }
    .compare-lbl { font-size: 10px; color: var(--text-muted); text-align: right; }
    .bar-track {
      height: 5px; background: var(--border);
      border-radius: 3px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.55s cubic-bezier(.4,0,.2,1);
    }
    .bar-orig { background: var(--text-muted); }
    .bar-comp { background: linear-gradient(90deg, var(--accent), var(--success)); }
    .compare-val { font-size: 10px; font-weight: 700; color: var(--text); }
    .compare-val.green { color: var(--success); }

    .compare-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 9px;
      border-top: 1px solid var(--border);
    }
    .saved-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--success-bg);
      border: 1px solid rgba(52,211,153,0.2);
      color: var(--success);
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .saved-pill svg { width: 10px; height: 10px; }
    .quality-tag {
      font-size: 10px; color: var(--text-muted);
      text-align: right; max-width: 55%;
    }

    /* ── Meta row ───────────────────────────────────────────── */
    .meta-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-bottom: 10px;
    }
    .meta-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
    }
    .meta-item-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .meta-item-value { font-size: 12px; font-weight: 700; color: var(--text); margin-top: 2px; }

    /* ── Action buttons ─────────────────────────────────────── */
    .btn-download {
      width: 100%; padding: 10px;
      border: none; border-radius: var(--radius-sm);
      background: var(--success);
      color: #0a1f14;
      font-size: 12px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: filter 0.12s;
      box-shadow: 0 2px 8px rgba(52,211,153,0.25);
    }
    .btn-download:hover { filter: brightness(1.08); }
    .btn-download svg { width: 13px; height: 13px; }

    .btn-ghost {
      width: 100%; padding: 9px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: transparent; color: var(--text-sub);
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 6px;
      transition: border-color 0.12s, color 0.12s;
    }
    .btn-ghost:hover { border-color: var(--border-light); color: var(--text); }
    .btn-ghost svg { width: 12px; height: 12px; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4Z" stroke="white" stroke-width="1.2"/>
      <path d="M5 11l2.5-3.5L9.5 10l1.5-2 2 3H3l2-0Z" fill="white" opacity="0.9"/>
      <circle cx="10.5" cy="5.5" r="1.2" fill="white"/>
    </svg>
  </div>
  <div class="header-text">
    <div class="header-title">Image Size Reducer</div>
    <div class="header-sub">Compress without changing dimensions</div>
  </div>
</div>

<!-- Layer selection -->
<div class="card">
  <div class="section-label">Layer</div>
  <div id="selectionArea">
    <div class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/>
          <path d="M5 13l3-4 2.5 3 1.5-2 2.5 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="11.5" cy="6.5" r="1.2" fill="currentColor"/>
        </svg>
      </div>
      <p><strong>Select a frame, group or image</strong><br>in Figma to get started</p>
    </div>
  </div>
</div>

<!-- Settings -->
<div class="card">
  <div class="section-label">Output Format</div>
  <div class="format-toggle">
    <button class="format-btn active" data-fmt="JPEG">JPEG</button>
    <button class="format-btn" data-fmt="WEBP">WebP</button>
  </div>
  <div class="format-hint" id="formatDesc">
    Best for photos &amp; opaque layers. Dimensions preserved; quality reduced only if needed.
  </div>

  <div class="divider"></div>

  <div class="section-label">Target File Size</div>
  <div class="size-row">
    <div class="size-input-wrap">
      <input type="number" class="size-input" id="targetSizeInput"
             placeholder="500" min="1" max="99999" value="500" />
    </div>
    <div class="unit-toggle">
      <button class="unit-btn active" data-unit="KB">KB</button>
      <button class="unit-btn" data-unit="MB">MB</button>
    </div>
  </div>

  <div class="presets">
    <span class="preset-lbl">Quick:</span>
    <button class="preset-btn" data-kb="100">100 KB</button>
    <button class="preset-btn" data-kb="200">200 KB</button>
    <button class="preset-btn" data-kb="500">500 KB</button>
    <button class="preset-btn" data-kb="1024">1 MB</button>
    <button class="preset-btn" data-kb="2048">2 MB</button>
  </div>
</div>

<!-- Status -->
<div class="status" id="status">
  <div class="spinner" id="statusSpinner"></div>
  <span id="statusText"></span>
</div>

<!-- CTA -->
<button class="btn-primary" id="exportBtn" disabled>
  <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M7 1v8M4 6l3 3 3-3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M2 10.5v1a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5v-1" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  Compress to Target Size
</button>

<!-- Result -->
<div class="output-section" id="outputSection">
  <div class="card" style="margin-top:8px;">
    <div class="section-label">Result</div>

    <div class="preview-wrap">
      <img id="previewImg" src="" alt="Preview" />
    </div>

    <div class="compare-block">
      <div class="compare-row">
        <div class="compare-lbl">Original</div>
        <div class="bar-track"><div class="bar-fill bar-orig" id="barOrig" style="width:100%"></div></div>
        <div class="compare-val" id="origSizeVal">—</div>
      </div>
      <div class="compare-row">
        <div class="compare-lbl">Compressed</div>
        <div class="bar-track"><div class="bar-fill bar-comp" id="barComp" style="width:0%"></div></div>
        <div class="compare-val green" id="compSizeVal">—</div>
      </div>
      <div class="compare-footer">
        <div class="saved-pill" id="savedBadge">
          <svg viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>—</span>
        </div>
        <div class="quality-tag" id="qualityNote"></div>
      </div>
    </div>

    <div class="meta-grid">
      <div class="meta-item">
        <div class="meta-item-label">Dimensions</div>
        <div class="meta-item-value" id="compDims">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-item-label">Format</div>
        <div class="meta-item-value" id="compFmt">—</div>
      </div>
    </div>

    <button class="btn-download" id="downloadBtn">
      <svg viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.5 1v7M4 5.5l2.5 2.5L9 5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M1.5 10v.5a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Download
    </button>

    <button class="btn-ghost" id="reExportBtn">
      <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 6a4 4 0 1 1 4 4H4m-2 0 2-2m-2 2 2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Export another
    </button>
  </div>
</div>

<script>
  let selectedNodeId = null;
  let selectedFormat = "JPEG";
  let selectedUnit   = "KB";
  let downloadUrl    = null;
  let downloadName   = "";

  // ── Messages from plugin ──────────────────────────────────────
  window.onmessage = (ev) => {
    const msg = ev.data.pluginMessage;
    if (!msg) return;
    if (msg.type === "selection") renderSelection(msg.nodes);
    if (msg.type === "progress")  showStatus("loading", msg.message);
    if (msg.type === "exported")  handleExported(msg);
    if (msg.type === "error")     { showStatus("error", msg.message); setBtnEnabled(true); }
  };

  // ── Selection ─────────────────────────────────────────────────
  function renderSelection(nodes) {
    const area = document.getElementById("selectionArea");
    selectedNodeId = null;
    updateBtn();

    if (!nodes || nodes.length === 0) {
      area.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/>
              <path d="M5 13l3-4 2.5 3 1.5-2 2.5 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="11.5" cy="6.5" r="1.2" fill="currentColor"/>
            </svg>
          </div>
          <p><strong>Select a frame, group or image</strong><br>in Figma to get started</p>
        </div>`;
      return;
    }

    area.innerHTML = `<div class="node-list" id="nodeList"></div>`;
    const list = document.getElementById("nodeList");

    nodes.forEach(n => {
      const el = document.createElement("div");
      el.className = "node-item";
      el.dataset.id = n.id;
      el.innerHTML = `
        <div class="node-icon">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.1"/>
            <path d="M3 9l2-3 2 2.5 1-1.5 2 2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="node-info">
          <div class="node-name">${esc(n.name)}</div>
          <div class="node-dims">${n.width} × ${n.height} px</div>
        </div>
        <span class="node-type-tag">${n.type}</span>
        <div class="check-ring">
          <svg viewBox="0 0 8 8" fill="none"><path d="M1.5 4l2 2 3-3" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>`;
      el.addEventListener("click", () => selectNode(n.id));
      list.appendChild(el);
    });

    if (nodes.length === 1) selectNode(nodes[0].id);
  }

  function selectNode(id) {
    selectedNodeId = id;
    document.querySelectorAll(".node-item").forEach(el =>
      el.classList.toggle("selected", el.dataset.id === id));
    updateBtn();
  }

  // ── Format ────────────────────────────────────────────────────
  const formatDescs = {
    JPEG: "Best for photos &amp; opaque layers. Dimensions preserved; quality reduced only if needed.",
    WEBP: "Modern format with superior compression, supports transparency. Dimensions preserved; quality reduced only if needed.",
  };

  document.querySelectorAll(".format-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".format-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedFormat = btn.dataset.fmt;
      document.getElementById("formatDesc").innerHTML = formatDescs[selectedFormat];
    });
  });

  // ── Unit ─────────────────────────────────────────────────────
  document.querySelectorAll(".unit-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".unit-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedUnit = btn.dataset.unit;
    });
  });

  // ── Quick presets ─────────────────────────────────────────────
  document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const kb = parseInt(btn.dataset.kb);
      if (kb >= 1024) {
        setUnit("MB");
        document.getElementById("targetSizeInput").value =
          (kb / 1024 % 1 === 0) ? kb / 1024 : (kb / 1024).toFixed(1);
      } else {
        setUnit("KB");
        document.getElementById("targetSizeInput").value = kb;
      }
    });
  });

  function setUnit(u) {
    selectedUnit = u;
    document.querySelectorAll(".unit-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.unit === u));
  }

  // ── Export trigger ────────────────────────────────────────────
  function updateBtn() {
    document.getElementById("exportBtn").disabled = !selectedNodeId;
  }
  function setBtnEnabled(v) {
    document.getElementById("exportBtn").disabled = !v;
  }

  document.getElementById("exportBtn").addEventListener("click", () => {
    if (!selectedNodeId) return;
    const raw = parseFloat(document.getElementById("targetSizeInput").value);
    if (!raw || raw <= 0) { showStatus("error", "Please enter a valid target size."); return; }

    setBtnEnabled(false);
    document.getElementById("outputSection").classList.remove("visible");
    showStatus("loading", "Exporting from Figma…");

    parent.postMessage({ pluginMessage: {
      type: "export",
      nodeId: selectedNodeId,
      format: selectedFormat,
      scale: 1,
    }}, "*");
  });

  // ── Handle exported bytes ─────────────────────────────────────
  async function handleExported(msg) {
    const { bytes, name, format } = msg;
    const uint8     = new Uint8Array(bytes);
    const origBytes = uint8.length;

    const raw         = parseFloat(document.getElementById("targetSizeInput").value) || 500;
    const targetBytes = Math.round(raw * (selectedUnit === "MB" ? 1048576 : 1024));

    showStatus("loading", "Compressing…");

    const srcBlob = new Blob([uint8], { type: "image/png" });
    const srcUrl  = URL.createObjectURL(srcBlob);
    const img     = await loadImage(srcUrl);
    URL.revokeObjectURL(srcUrl);

    const W = img.naturalWidth, H = img.naturalHeight;
    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    if (format === "JPEG") {
      // JPEG has no alpha channel — fill white so transparent areas don't go black
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, W, H);
    }
    ctx.drawImage(img, 0, 0);

    const mime  = format === "JPEG" ? "image/jpeg" : "image/webp";
    const label = format === "JPEG" ? "JPEG" : "WebP";
    showStatus("loading", `Finding optimal ${label} quality…`);
    const r = await qualityBinarySearch(canvas, mime, targetBytes);

    const qualityNote = r.unreachable
      ? "⚠ Target too small — minimum quality used"
      : r.quality >= 1.0
        ? "✓ No quality loss"
        : `⚠ Quality reduced to ${Math.round(r.quality * 100)}%`;

    if (downloadUrl) URL.revokeObjectURL(downloadUrl);
    downloadUrl  = URL.createObjectURL(r.blob);
    downloadName = `${sanitize(name)}.${format === "JPEG" ? "jpg" : "webp"}`;

    const compBytes = r.blob.size;
    const saved     = Math.max(0, Math.round((1 - compBytes / origBytes) * 100));
    const ratio     = Math.min(1, compBytes / origBytes);

    document.getElementById("previewImg").src      = downloadUrl;
    document.getElementById("origSizeVal").textContent = fmtBytes(origBytes);
    document.getElementById("compSizeVal").textContent = fmtBytes(compBytes);
    document.getElementById("barOrig").style.width = "100%";
    document.getElementById("barComp").style.width = Math.round(ratio * 100) + "%";
    document.getElementById("savedBadge").querySelector("span").textContent =
      saved > 0 ? `${saved}% smaller` : "Already optimal";
    document.getElementById("compDims").textContent = `${W} × ${H}`;
    document.getElementById("compFmt").textContent  = label;
    document.getElementById("qualityNote").textContent = qualityNote;

    document.getElementById("outputSection").classList.add("visible");
    showStatus("success", `Done — ${fmtBytes(compBytes)}${saved > 0 ? `, saved ${saved}%` : ""}.`);
    setBtnEnabled(true);
  }

  // ── Quality binary search ─────────────────────────────────────
  async function qualityBinarySearch(canvas, mime, targetBytes) {
    const maxBlob = await toBlob(canvas, mime, 1.0);
    if (maxBlob.size <= targetBytes) return { blob: maxBlob, quality: 1.0 };

    const minBlob = await toBlob(canvas, mime, 0.01);
    if (minBlob.size > targetBytes) return { blob: minBlob, quality: 0.01, unreachable: true };

    let lo = 0.01, hi = 1.0, best = minBlob, bestQ = 0.01;
    for (let i = 0; i < 14; i++) {
      const mid  = (lo + hi) / 2;
      const blob = await toBlob(canvas, mime, mid);
      if (blob.size <= targetBytes) { best = blob; bestQ = mid; lo = mid; }
      else                          { hi = mid; }
      if (hi - lo < 0.001) break;
    }
    return { blob: best, quality: bestQ };
  }

  // ── Helpers ───────────────────────────────────────────────────
  function toBlob(canvas, mime, quality) {
    return new Promise(res => canvas.toBlob(res, mime, quality));
  }

  function loadImage(src) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload  = () => res(img);
      img.onerror = rej;
      img.src     = src;
    });
  }

  function showStatus(type, text) {
    const el = document.getElementById("status");
    el.className = `status visible ${type}`;
    document.getElementById("statusText").textContent = text;
    document.getElementById("statusSpinner").style.display =
      type === "loading" ? "block" : "none";
  }

  function fmtBytes(b) {
    if (b >= 1048576) return (b / 1048576).toFixed(2) + " MB";
    if (b >= 1024)    return (b / 1024).toFixed(1) + " KB";
    return b + " B";
  }

  function sanitize(n) {
    return (n || "export").replace(/[^a-zA-Z0-9_\-. ]/g, "_").trim() || "export";
  }

  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── Download / reset ──────────────────────────────────────────
  document.getElementById("downloadBtn").addEventListener("click", () => {
    if (!downloadUrl) return;
    const a = document.createElement("a");
    a.href = downloadUrl; a.download = downloadName; a.click();
  });

  document.getElementById("reExportBtn").addEventListener("click", () => {
    document.getElementById("outputSection").classList.remove("visible");
    document.getElementById("status").className = "status";
    fitWindow();
  });

  function fitWindow() {
    const h = document.body.scrollHeight;
    parent.postMessage({ pluginMessage: { type: "resize", height: h } }, "*");
  }

  // Fit on load and after any DOM change that affects height
  window.addEventListener("load", fitWindow);
  new MutationObserver(fitWindow).observe(document.body, { subtree: true, childList: true, attributes: true });
</script>
</body>
</html>
